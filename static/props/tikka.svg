<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 220">
  <!-- Chaîne principale épaisse -->
  <line x1="50" y1="0" x2="50" y2="45" stroke="#d4af37" stroke-width="5" />
  <line x1="50" y1="70" x2="50" y2="105" stroke="#d4af37" stroke-width="5" />
  <line x1="50" y1="130" x2="50" y2="155" stroke="#d4af37" stroke-width="5" />
  <!-- Perles de chaîne -->
  <circle cx="50" cy="15" r="6" fill="#f5c518" stroke="#d4af37" stroke-width="2" />
  <circle cx="50" cy="35" r="6" fill="#f5c518" stroke="#d4af37" stroke-width="2" />
  <circle cx="50" cy="90" r="6" fill="#f5c518" stroke="#d4af37" stroke-width="2" />
  <circle cx="50" cy="140" r="6" fill="#f5c518" stroke="#d4af37" stroke-width="2" />
  <!-- Pendentif médian -->
  <circle cx="50" cy="60" r="14" fill="#d4af37" stroke="#c9960c" stroke-width="2" />
  <circle cx="50" cy="60" r="9" fill="#2ecc71" />
  <circle cx="50" cy="60" r="5" fill="#27ae60" />
  <!-- Pendentif principal -->
  <circle cx="50" cy="180" r="28" fill="#d4af37" stroke="#c9960c" stroke-width="3" />
  <circle cx="50" cy="180" r="20" fill="#e74c3c" />
  <circle cx="50" cy="180" r="12" fill="#c0392b" />
  <!-- Reflet -->
  <ellipse cx="43" cy="173" rx="6" ry="5" fill="rgba(255,255,255,0.35)" />
  <!-- Perles latérales autour du pendentif -->
  <circle cx="25" cy="175" r="5" fill="#f5c518" stroke="#d4af37" stroke-width="1.5" />
  <circle cx="75" cy="175" r="5" fill="#f5c518" stroke="#d4af37" stroke-width="1.5" />
  <circle cx="28" cy="192" r="4" fill="#f5c518" stroke="#d4af37" stroke-width="1.5" />
  <circle cx="72" cy="192" r="4" fill="#f5c518" stroke="#d4af37" stroke-width="1.5" />
  <!-- Petites perles entre les pendentifs -->
  <circle cx="50" cy="115" r="5" fill="#f5c518" stroke="#d4af37" stroke-width="1.5" />
</svg>
