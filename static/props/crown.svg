  <!-- Base -->
  <rect x="10" y="100" width="180" height="20" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2" />
  <!-- Gemmes -->
  <circle cx="100" cy="75" r="8" fill="#e74c3c" />
  <circle cx="55" cy="85" r="6" fill="#3498db" />
  <circle cx="145" cy="85" r="6" fill="#3498db" />
  <!-- Pointes - boules -->
  <circle cx="20" cy="40" r="5" fill="#f1c40f" stroke="#e67e22" stroke-width="2" />
  <circle cx="100" cy="10" r="5" fill="#f1c40f" stroke="#e67e22" stroke-width="2" />
  <circle cx="180" cy="40" r="5" fill="#f1c40f" stroke="#e67e22" stroke-width="2" />
</svg>
